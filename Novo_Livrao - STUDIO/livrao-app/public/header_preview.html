<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protótipo do Cabeçalho - Livrão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'history-green': '#134e4a', // Aproximação do verde
                        'history-gold': '#d4af37',
                    }
                }
            }
        }
    </script>
    <style>
        .mask-linear-fade {
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }
    </style>
</head>

<body class="bg-stone-50 font-sans">

    <!-- Header Wrapper -->
    <header class="bg-history-green text-white py-3 shadow-md sticky top-0">
        <div class="max-w-4xl mx-auto px-4 relative">

            <!-- LOGO BADGE (Absolute & Large) -->
            <!-- Usando caminho absoluto local para visualização -->
            <div class="absolute -top-2 left-0 z-50">
                <div
                    class="w-24 h-24 bg-stone-900 rounded-full shadow-2xl border-2 border-white/20 overflow-hidden flex items-center justify-center relative">
                    <!-- Placeholder de Imagem ou Imagem Real -->
                    <img src="file:///c:/Users/dvisr/OneDrive/Comissão Livrão de Família/Novo livrão/livrao-app/public/logo-livrao.png"
                        alt="Logo" class="w-full h-full object-cover"
                        onerror="this.src='https://placehold.co/100x100/134e4a/d4af37?text=LOGO'" />
                </div>
            </div>

            <!-- Main Content (Pushed Right with pl-28) -->
            <div class="pl-28 flex justify-between items-center mb-2 min-h-[40px]">

                <!-- Title Removed or Hidden as requested (Logo replaces it) -->
                <div>
                    <!-- <h1 class="text-xl font-bold font-serif text-history-gold leading-none">Livrão da Família</h1> -->
                    <!-- Espaço vazio ou subtítulo se necessário -->
                </div>

                <!-- Right Actions -->
                <div class="flex items-center gap-4">
                    <button
                        class="bg-red-500/80 hover:bg-red-600 text-white font-bold text-[10px] py-1.5 px-3 rounded uppercase tracking-wider flex items-center gap-1.5 border border-white/30">
                        🗑️ Apagar
                    </button>
                    <button
                        class="bg-white/10 hover:bg-white/20 text-white font-bold text-[10px] py-1.5 px-3 rounded uppercase tracking-wider flex items-center gap-1.5 border border-white/30">
                        💾 Salvar
                    </button>
                </div>
            </div>

            <!-- Bottom Area (Progress & Nav) -->
            <div class="pl-28 mt-1 pt-2 border-t border-white/10">

                <!-- Progress Bar Mock -->
                <div class="w-full pb-1">
                    <div class="flex justify-between text-[10px] text-white/90 font-bold uppercase tracking-wider mb-1">
                        <span>EDITANDO</span>
                        <span>45%</span>
                    </div>
                    <div class="h-1.5 bg-black/20 rounded-full overflow-hidden mb-1 border border-white/10">
                        <div class="h-full bg-history-gold w-[45%] shadow-[0_0_10px_gold]"></div>
                    </div>
                    <div class="text-[11px] text-white font-medium truncate">
                        <span class="opacity-70 mr-1">EDITANDO:</span>
                        <span class="font-bold text-white">Vidal David Israel...</span>
                    </div>
                </div>

                <!-- NavBar Mock -->
                <div class="flex items-center gap-2 mt-3 pb-1 overflow-x-auto">
                    <button
                        class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-wider text-white/60 border border-transparent hover:bg-white/10">
                        👤 Identidade
                    </button>
                    <button
                        class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-wider bg-white text-history-green shadow-sm transform scale-105">
                        🕎 Família e Vida
                    </button>
                    <button
                        class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-wider text-white/60 border border-transparent hover:bg-white/10">
                        💼 Trajetória
                    </button>
                    <button
                        class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-wider text-white/60 border border-transparent hover:bg-white/10">
                        📖 Memórias Vivas
                    </button>
                    <button
                        class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-wider text-white/60 border border-transparent hover:bg-white/10">
                        📸 Fotos
                    </button>
                </div>

            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <div class="text-center text-stone-400 mt-10">
            (Conteúdo do Formulário Aqui)
        </div>
    </main>

</body>

</html>
